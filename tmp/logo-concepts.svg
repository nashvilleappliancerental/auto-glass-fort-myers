<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="480" viewBox="0 0 1020 480" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1020" height="480" fill="#f4f5f7"/>
  <text x="40" y="46" font-size="26" font-weight="800" fill="#111827">Auto Glass Fort Myers — logo mark concepts</text>
  <text x="40" y="74" font-size="15" fill="#6b7280">Cream outline + Glass-Blue accent on the dark panel. Pick A, B, or C (or say what to change).</text>

  <!-- ============ A: Windshield + shine ============ -->
  <g transform="translate(40,100)">
    <rect width="300" height="300" rx="16" fill="#0f1b2d"/>
    <g stroke="#eef4fb" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- windshield dome -->
      <path d="M96,196 C90,118 120,96 150,96 C180,96 210,118 204,196 Z"/>
      <!-- dashboard band -->
      <path d="M101,176 L199,176"/>
      <!-- center pillar -->
      <path d="M150,96 L150,176"/>
    </g>
    <!-- accent shine sparkle -->
    <g fill="#2f6bff">
      <path d="M183,116 l6,16 16,6 -16,6 -6,16 -6,-16 -16,-6 16,-6 Z"/>
    </g>
    <text x="150" y="262" font-size="18" font-weight="700" fill="#eef4fb" text-anchor="middle">A · Windshield + shine</text>
  </g>

  <!-- ============ B: Pane + reflection ============ -->
  <g transform="translate(360,100)">
    <rect width="300" height="300" rx="16" fill="#0f1b2d"/>
    <g stroke="#eef4fb" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- glass pane (rounded square, slightly tilted feel via rounded corners) -->
      <rect x="96" y="96" width="108" height="108" rx="18"/>
    </g>
    <!-- accent diagonal reflection stripes -->
    <g stroke="#2f6bff" stroke-width="9" stroke-linecap="round">
      <path d="M120,176 L168,120"/>
      <path d="M150,182 L188,138"/>
    </g>
    <text x="150" y="262" font-size="18" font-weight="700" fill="#eef4fb" text-anchor="middle">B · Pane + reflection</text>
  </g>

  <!-- ============ C: Shield badge ============ -->
  <g transform="translate(680,100)">
    <rect width="300" height="300" rx="16" fill="#0f1b2d"/>
    <g stroke="#eef4fb" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- shield -->
      <path d="M150,92 L200,110 C200,164 180,196 150,210 C120,196 100,164 100,110 Z"/>
    </g>
    <!-- accent check (chip repaired / trust) -->
    <g stroke="#2f6bff" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M128,150 L144,166 L174,130"/>
    </g>
    <text x="150" y="262" font-size="18" font-weight="700" fill="#eef4fb" text-anchor="middle">C · Shield + check</text>
  </g>
</svg>
